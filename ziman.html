<!DOCTYPE html>
<html lang="ku" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziman | Ronesans Projêkt</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --dark-blue: #022D44; --bright-yellow: #F7D200; --light-grey: #E9ECE6; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--light-grey); color: var(--dark-blue); }
        header { background: var(--dark-blue); padding: 1rem 5%; border-bottom: 4px solid var(--bright-yellow); display: flex; justify-content: space-between; align-items: center; }
        .ziman-hero { background: var(--dark-blue); padding: 60px 20px; text-align: center; color: white; border-bottom: 6px solid var(--bright-yellow); }
        .search-container { max-width: 600px; margin: -30px auto 40px; padding: 0 20px; }
        .search-wrapper { background: white; padding: 5px; display: flex; border-radius: 50px; border: 2px solid var(--bright-yellow); }
        #searchInput { flex: 1; border: none; padding: 15px 20px; outline: none; border-radius: 50px; }
        .search-btn { background: var(--dark-blue); color: var(--bright-yellow); border: none; padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: 700; }
        .dictionary-grid { max-width: 900px; margin: 0 auto 50px; padding: 20px; }
        .term-card { background: white; padding: 25px; margin-bottom: 15px; border-left: 6px solid var(--bright-yellow); box-shadow: 0 5px 10px rgba(0,0,0,0.1); }
        .ku-term { font-size: 1.5rem; font-weight: 800; color: var(--dark-blue); }
    </style>
</head>
<body>

<header>
    <div style="color:var(--bright-yellow); font-weight:700;">ZIMAN</div>
</header>

<section class="ziman-hero">
    <h1>Navenda Ziman</h1>
    <p>Lêgerîna zindî di Wîkîferhengê de</p>
</section>

<div class="search-container">
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Peyvekê binivîse...">
        <button class="search-btn" onclick="searchWord()">LÊGERÎN</button>
    </div>
</div>

<div class="dictionary-grid" id="results"></div>

<script>
    async function searchWord() {
        const word = document.getElementById('searchInput').value;
        const resultsDiv = document.getElementById('results');
        if (!word) return;

        resultsDiv.innerHTML = 'Li benda encamê be...';
        
        [span_2](start_span)// استخدام MediaWiki Action API لجلب المحتوى[span_2](end_span)
        const url = `https://ku.wiktionary.org/w/api.php?action=query&format=json&prop=extracts&titles=${word}&exintro=1&explaintext=1&origin=*`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            const pages = data.query.pages;
            const pageId = Object.keys(pages)[0];
            const content = pages[pageId].extract;

            if (content) {
                resultsDiv.innerHTML = `
                    <div class="term-card">
                        <div class="ku-term">${word}</div>
                        <p>${content}</p>
                    </div>`;
            } else {
                resultsDiv.innerHTML = '<p>Bibore, ev peyv nehat dîtin.</p>';
            }
        } catch (e) {
            resultsDiv.innerHTML = '<p>Çewtiyek çêbû.</p>';
        }
    }
</script>

</body>
</html>
