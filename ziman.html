<!DOCTYPE html>
<html lang="ku" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziman | Ronesans Projêkt</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-blue: #022D44;
            --deep-blue: #0B1D26;
            --bright-yellow: #F7D200;
            --light-grey: #E9ECE6;
            --white: #FFFFFF;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: var(--light-grey);
            color: var(--deep-blue);
        }

        /* Header الثابت بالهوية البصرية */
        header {
            background: var(--dark-blue);
            padding: 0.9rem 5%;
            border-bottom: 4px solid var(--bright-yellow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .back-btn {
            color: var(--bright-yellow);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.75rem;
            border: 1px solid var(--bright-yellow);
            padding: 4px 10px;
            transition: 0.3s;
        }

        .back-btn:hover { background: var(--bright-yellow); color: var(--dark-blue); }

        .logo-area img { height: 60px; display: block; }

        /* Hero Section مع خلفية المشروع */
        .ziman-hero {
            position: relative;
            background-image: url('hero-ziman.png');
            background-size: cover;
            background-position: center;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
            color: white;
            border-bottom: 6px solid var(--bright-yellow);
        }

        .ziman-hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(2, 45, 68, 0.8), rgba(11, 29, 38, 0.9));
        }

        .ziman-hero h1, .ziman-hero p { position: relative; z-index: 2; }
        .ziman-hero h1 { font-size: 2.5rem; margin: 0; font-weight: 800; letter-spacing: 1px; }

        /* مربع البحث الذكي */
        .search-container {
            max-width: 700px;
            margin: -35px auto 40px;
            position: relative;
            z-index: 5;
            padding: 0 20px;
        }

        .search-wrapper {
            background: white;
            padding: 8px;
            display: flex;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border-radius: 50px; /* تصميم عصري بيضاوي */
            border: 2px solid var(--bright-yellow);
        }

        #searchInput {
            flex: 1;
            border: none;
            padding: 15px 25px;
            font-size: 1.1rem;
            outline: none;
            font-family: inherit;
            border-radius: 50px;
        }

        .search-btn {
            background: var(--dark-blue);
            color: var(--bright-yellow);
            border: none;
            padding: 0 25px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-btn:hover { background: var(--deep-blue); }

        /* نتائج القاموس (API) */
        .dictionary-grid {
            max-width: 800px;
            margin: 0 auto 60px;
            padding: 20px;
        }

        .term-card {
            background: white;
            padding: 30px;
            border-left: 8px solid var(--bright-yellow);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .category-tag { 
            font-size: 0.75rem; 
            color: var(--dark-blue); 
            background: var(--light-grey);
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 800; 
            text-transform: uppercase;
        }

        .ku-term { font-size: 2rem; color: var(--dark-blue); font-weight: 800; margin: 15px 0; }
        .def { font-size: 1.05rem; color: #444; line-height: 1.8; }

        .loading-text { text-align: center; color: var(--dark-blue); font-weight: 600; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">← VEGERANDIN</a>
    <div class="logo-area">
        <img src="logo.png" alt="Ronesans Logo">
    </div>
</header>

<section class="ziman-hero">
    <h1>Navenda Ziman</h1>
    <p>Lêgerîna zindî di Wîkîferhengê de</p>
</section>

<div class="search-container">
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Peyvekê binivîse... (mînak: Afrandin)" onkeypress="handleKeyPress(event)">
        <button class="search-btn" onclick="fetchFromWiki()">LÊGERÎN</button>
    </div>
</div>

<div class="dictionary-grid" id="dictionaryGrid">
    <!-- Nîşandanê encaman li vir e -->
</div>

<script>
    function handleKeyPress(e) {
        if (e.key === 'Enter') fetchFromWiki();
    }

    async function fetchFromWiki() {
        const word = document.getElementById('searchInput').value.trim();
        const grid = document.getElementById('dictionaryGrid');

        if (!word) return;

        grid.innerHTML = '<p class="loading-text">Li benda encamê be...</p>';

        // API ya Wîkîferheng (MediaWiki API)
        const url = `https://ku.wiktionary.org/api/rest_v1/page/definition/${word}`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("Peyv nehat dîtin");
            
            const data = await response.json();
            
            if (data && data.ku) {
                const entry = data.ku[0];
                const category = entry.partOfSpeech;
                const definition = entry.definitions[0].definition.replace(/<[^>]*>?/gm, ''); // Paqijkirina HTML

                grid.innerHTML = `
                    <div class="term-card">
                        <span class="category-tag">${category}</span>
                        <div class="ku-term">${word}</div>
                        <div class="def">${definition}</div>
                    </div>
                `;
            } else {
                grid.innerHTML = '<p class="loading-text">Bibore! Ev peyv di sîstemê de tuneye.</p>';
            }
        } catch (error) {
            grid.innerHTML = '<p class="loading-text">Heta niha ev peyv nehatiye zêdekirin.</p>';
        }
    }
</script>

</body>
</html>
