<!DOCTYPE html>
<html lang="ku" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çand | Ronesans Projêkt</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-blue: #022D44;
            --deep-blue: #0B1D26;
            --bright-yellow: #F7D200;
            --light-grey: #E9ECE6;
            --white: #FFFFFF;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: var(--light-grey);
            color: var(--deep-blue);
        }

        /* Header */
        header {
            background: var(--dark-blue);
            padding: 0.9rem 5%;
            border-bottom: 4px solid var(--bright-yellow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .back-btn {
            color: var(--bright-yellow);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.75rem;
            border: 1px solid var(--bright-yellow);
            padding: 4px 10px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: var(--bright-yellow);
            color: var(--dark-blue);
        }

        .logo-area img {
            height: 60px;
            display: block;
        }

        /* Hero Çand */
        .cand-hero {
            position: relative;
            background-image: url('hero-cand.png'); /* الصورة المطلوبة */
            background-size: cover;
            background-position: center;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
            text-align: center;
            color: white;
            overflow: hidden;
            border-bottom: 6px solid var(--bright-yellow);
        }

        .cand-hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(2, 45, 68, 0.75), rgba(11, 29, 38, 0.85));
            z-index: 1;
        }

        .cand-hero h1, .cand-hero p {
            position: relative;
            z-index: 2;
        }

        .cand-hero h1 { font-size: 2.5rem; margin: 0; font-weight: 800; }
        .cand-hero p { opacity: 0.9; margin-top: 10px; font-weight: 500; }

        /* Search Section */
        .search-container {
            max-width: 800px;
            margin: -40px auto 40px;
            position: relative;
            z-index: 5;
            padding: 0 20px;
        }

        .search-wrapper {
            background: white;
            padding: 10px;
            display: flex;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        #searchInput {
            flex: 1;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            outline: none;
            font-family: inherit;
        }

        /* Dictionary/Content Grid */
        .content-grid {
            max-width: 1000px;
            margin: 0 auto 60px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .item-card {
            background: white;
            padding: 25px;
            border-left: 6px solid var(--dark-blue);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.3s;
            cursor: pointer;
        }

        .item-card:hover {
            transform: translateY(-5px);
            border-left-color: var(--bright-yellow);
        }

        .category-tag { font-size: 0.7rem; color: #F18805; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .item-title { font-size: 1.4rem; color: var(--dark-blue); font-weight: 700; margin: 5px 0; }
        .item-desc { font-size: 0.9rem; color: #555; line-height: 1.5; }

        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 40px;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">← VEGERANDIN</a>
    <div class="logo-area">
        <img src="logo.png" alt="Ronesans Projêkt">
    </div>
</header>

<section class="cand-hero">
    <h1>Navenda Çandê</h1>
    <p>Naskirina reh û kûrahiya çanda kurdî</p>
</section>

<div class="search-container">
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Li babetekê bigere..." onkeyup="searchContent()">
    </div>
</div>

<div class="content-grid" id="contentGrid"></div>

<div style="text-align: center; padding: 20px; color: var(--dark-blue); font-weight: 600; font-size: 0.8rem;">
    © 2026 Ronesans Projêkt - BER BI PÊŞEROJÊ VE
</div>

<script>
    const contents = [
        { cat: "Kevneşopî", title: "Thaqafa Kurdî", desc: "Lêkolîn li ser dabeş û rûmetên civaka kurdî." },
        { cat: "Dîrok", title: "Tarîxa Kurdî", desc: "Ji demên kevnar heta îro, rûpelên zêrîn ên dîroka me." },
        { cat: "Kesayet", title: "Kesayetên Kurd", desc: "Naskirina pêşeng, zana û lehengên kurd di dîrokê de." },
        { cat: "Bandor", title: "Bandora Çanda Kurdî", desc: "Çawa çanda kurdî li ser gelên herêmê û cîhanê bandor kiriye." },
        { cat: "Hevbandorî", title: "Bandora Cîhanê", desc: "Bandora gelên herêmê û cîhanê li ser pêşketina çanda kurdî." }
    ];

    function displayContent(filteredItems) {
        const grid = document.getElementById('contentGrid');
        grid.innerHTML = '';

        if (filteredItems.length === 0) {
            grid.innerHTML = '<div class="no-results">Babet nehat dîtin!</div>';
            return;
        }

        filteredItems.forEach(item => {
            const card = `
                <div class="item-card">
                    <div class="category-tag">${item.cat}</div>
                    <div class="item-title">${item.title}</div>
                    <div class="item-desc">${item.desc}</div>
                </div>
            `;
            grid.innerHTML += card;
        });
    }

    function searchContent() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = contents.filter(item => 
            item.title.toLowerCase().includes(query) || 
            item.cat.toLowerCase().includes(query)
        );
        displayContent(filtered);
    }

    displayContent(contents);
</script>

</body>
</html>
